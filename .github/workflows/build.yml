# GitHub Actions 工作流配置文件
# 用于自动构建 Windows、macOS、Linux 三端应用

name: Build Multi-Platform App

# 触发条件：什么时候运行这个工作流
on:
  # 当推送到 main 分支或创建 tag 时触发
  push:
    branches:
      - main
    tags:
      - 'v*'
  # 允许手动触发
  workflow_dispatch:

# 定义任务
jobs:
  build:
    # 任务名称
    name: Build on ${{ matrix.platform }}

    # 使用矩阵策略：同时在 3 个平台上运行
    strategy:
      fail-fast: false  # 一个平台失败不影响其他平台
      matrix:
        platform:
          - windows-latest  # Windows Server 2022
          - macos-latest    # macOS 14 (Sonoma)
          - ubuntu-22.04    # Ubuntu 22.04

    # 指定运行的虚拟机
    runs-on: ${{ matrix.platform }}

    # 执行步骤
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 使用 Node.js 20
          cache: 'npm'        # 缓存 npm 依赖，加速构建

      # 3. 安装 Rust（Tauri 需要）
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # 4. 安装 Linux 依赖（仅 Linux 需要）
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # 5. 安装项目依赖
      - name: Install dependencies
        run: npm ci  # ci 比 install 更快更可靠

      # 6. 构建应用
      - name: Build Tauri app
        run: npm run tauri build

      # 7. 上传构建产物（Windows）
      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      # 8. 上传构建产物（macOS）
      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

      # 9. 上传构建产物（Linux）
      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  # 可选：自动发布到 GitHub Releases
  release:
    name: Create Release
    needs: build  # 等待 build 任务完成
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')  # 仅在创建 tag 时运行

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-installer/*
            macos-installer/*
            linux-installer/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
